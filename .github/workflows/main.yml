name: Network Security App CI/CD Pipeline

on:
  push:
    branches:
      - main
    # This prevents the workflow from running if only the README is modified
    paths-ignore:
      - 'README.md'

jobs:
  # ==========================================
  # 1. CONTINUOUS INTEGRATION (CI)
  # ==========================================
  Continuous-Integration:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint code
        run: echo "Linting Repository"

      # Validates that the application dependencies can be successfully installed
      - name: Run unit test
        run: echo "Running unit tests"

  # ==========================================
  # 2. CONTINUOUS DELIVERY (CD)
  # ==========================================
  Continuous-Delivery:
    name: Continuous Delivery
    needs: Continuous-Integration # Waits for CI to pass
    runs-on: ubuntu-latest
    # We export the registry URL so the Deployment job can use it later
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Utilities
        run: |
            sudo apt-get update
            sudo apt-get install -y jq unzip

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "::set-output name=image::$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"